<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline' https://cdn.jsdelivr.net vscode-webview-resource:; script-src 'unsafe-inline' https://cdn.jsdelivr.net vscode-webview-resource:; img-src https: data: vscode-webview-resource:; connect-src ws: wss: http: https:;">
    <title>RepoSense</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Navigation Tabs -->
    <nav class="tab-bar">
        <button class="tab-button active" data-panel="health">
            <span class="tab-icon">◎</span>
            <span class="tab-label">Score</span>
        </button>
        <button class="tab-button" data-panel="architecture">
            <span class="tab-icon">⬡</span>
            <span class="tab-label">Arch</span>
        </button>
        <button class="tab-button" data-panel="review">
            <span class="tab-icon">◈</span>
            <span class="tab-label">Review</span>
            <span class="tab-badge" id="reviewBadge"></span>
        </button>
        <button class="tab-button" data-panel="docs">
            <span class="tab-icon">◻</span>
            <span class="tab-label">Docs</span>
        </button>
        <button class="tab-button" data-panel="security">
            <span class="tab-icon">◆</span>
            <span class="tab-label">Security</span>
            <span class="tab-badge" id="securityBadge"></span>
        </button>
    </nav>

    <!-- Main Content Area -->
    <main class="content-area">

        <!-- Idle State -->
        <div id="idleState" class="state-panel hidden">
            <div class="state-inner">
                <div class="state-icon">—</div>
                <p class="state-title">No folder open</p>
                <p class="state-sub">Open a workspace folder to begin.</p>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="state-panel">
            <div class="state-inner">
                <div class="spinner"></div>
                <p class="state-title">Scanning your repo</p>
                <p class="state-sub" id="loadingStep">Initializing...</p>
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
            </div>
        </div>

        <!-- Error State -->
        <div id="errorState" class="state-panel hidden">
            <div class="state-inner">
                <div class="state-icon err">✕</div>
                <p class="state-title">Analysis failed</p>
                <p class="state-sub" id="errorMessage"></p>
                <button id="retryButton" class="btn-primary">Try again</button>
            </div>
        </div>

        <!-- Health Score Panel -->
        <div id="healthPanel" class="panel hidden">
            <div class="panel-actions">
                <button id="expandButton" class="btn-ghost">⤢ Full view</button>
                <button id="rerunButton"  class="btn-ghost">↺ Re-run</button>
            </div>

            <div class="score-hero">
                <div class="score-ring-wrap">
                    <svg class="score-ring" viewBox="0 0 100 100">
                        <defs>
                            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%"   stop-color="#8b5cf6"/>
                                <stop offset="100%" stop-color="#ec4899"/>
                            </linearGradient>
                        </defs>
                        <circle class="ring-track" cx="50" cy="50" r="40"/>
                        <circle id="ringFill" class="ring-fill" cx="50" cy="50" r="40"
                                stroke="url(#ringGrad)"
                                stroke-dasharray="251"
                                stroke-dashoffset="251"/>
                    </svg>
                    <span class="score-num" id="scoreNum">—</span>
                </div>
                <div id="gradeBadge" class="grade-chip">—</div>
            </div>

            <p id="summary" class="summary-text"></p>

            <div class="section">
                <p class="section-label">Top priorities</p>
                <ol id="priorityList" class="priority-list"></ol>
            </div>
        </div>

        <!-- Architecture Panel -->
        <div id="architecturePanel" class="panel hidden">
            <div class="arch-wrap">
                <div class="arch-toolbar">
                    <div class="btn-group">
                        <button id="networkView" class="btn-seg">Network</button>
                        <button id="treeView"    class="btn-seg active">Tree</button>
                    </div>
                    <div class="btn-group">
                        <button id="zoomIn"    class="btn-icon">+</button>
                        <button id="zoomOut"   class="btn-icon">−</button>
                        <button id="resetZoom" class="btn-icon">⟲</button>
                    </div>
                    <div class="depth-row" id="depthControl">
                        <span class="section-label">Depth</span>
                        <input type="range" id="depthSlider" min="1" max="5" value="1" step="1">
                        <span id="depthValue" class="depth-val">1</span>
                    </div>
                </div>
                <div id="graphContainer" class="graph-canvas"></div>
                <div id="nodeTooltip" class="tooltip hidden"></div>
            </div>
        </div>

        <!-- Code Review Panel -->
        <div id="reviewPanel" class="panel hidden">
            <div class="filter-row">
                <button class="btn-filter active" data-filter="all">All</button>
                <button class="btn-filter" data-filter="high">High+</button>
                <button class="btn-filter" data-filter="critical">Critical</button>
            </div>
            <div id="findingsList" class="findings-list"></div>
            <div id="emptyReview" class="empty hidden">No issues found</div>
        </div>

        <!-- Docs Panel -->
        <div id="docsPanel" class="panel hidden">
            <div class="tab2-bar">
                <button class="tab2 active" data-tab="docs">Docs</button>
                <button class="tab2" data-tab="tests">Tests</button>
            </div>
            <div id="docsContent"  class="doc-list"></div>
            <div id="testsContent" class="doc-list hidden"></div>
        </div>

        <!-- Security Panel -->
        <div id="securityPanel" class="panel hidden">
            <div class="section-label row-label">Security issues</div>
            <div id="securityIssues" class="issue-list"></div>
            <div id="emptySecurityIssues" class="empty hidden">No security issues found</div>

            <div class="section-label row-label" style="margin-top:16px">Modernization</div>
            <div id="modernizationList" class="issue-list"></div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="main.js"></script>
</body>
</html>
